<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | Chamchamz Archive</title>
  
  <!-- Explicitly set the configuration path from root to prevent 404 router mismatch on Vercel -->
  <link rel="cms-config-url" type="text/yaml" href="/admin/config.yml" />
  
  <!-- Modern robust error interceptor to surface any CMS runtime issues directly back to the screen -->
  <script>
    window.addEventListener('error', function(e) {
      showError('Lỗi Runtime: ' + e.message + ' tại ' + e.filename + ':' + e.lineno);
    });
    window.addEventListener('unhandledrejection', function(e) {
      showError('Lỗi Unhandled Promise rejection: ' + (e.reason ? e.reason.message || e.reason : e));
    });
    
    function showError(message) {
      console.error("[CMS Error] " + message);
      const errUI = document.getElementById('cms-error-ui');
      if (errUI) {
        const pre = errUI.querySelector('pre');
        if (pre) {
          pre.innerText += '\n' + message;
        }
        return;
      }
      
      const errDiv = document.createElement('div');
      errDiv.id = 'cms-error-ui';
      errDiv.style.position = 'fixed';
      errDiv.style.bottom = '20px';
      errDiv.style.left = '20px';
      errDiv.style.right = '20px';
      errDiv.style.background = '#fff1f2';
      errDiv.style.color = '#be123c';
      errDiv.style.padding = '20px';
      errDiv.style.border = '3px solid #e11d48';
      errDiv.style.borderRadius = '12px';
      errDiv.style.fontFamily = 'monospace';
      errDiv.style.fontSize = '12px';
      errDiv.style.zIndex = '999999';
      errDiv.style.boxShadow = '0 10px 15px -3px rgba(0, 0, 0, 0.2)';
      errDiv.innerHTML = '<strong>⚠️ Phát hiện sự cố tải ứng dụng quản lý hoặc lỗi bắt tay:</strong>' +
        '<pre style="margin: 10px 0 0 0; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; background: #ffe4e6; padding: 10px; border-radius: 6px;">' + message + '</pre>' +
        '<p style="margin: 10px 0 0 0; font-size: 11px; color: #475569;">💡 Gợi ý: Hãy mở Console (phím F12) của trình duyệt để kiểm tra chi tiết lỗi mạng (CORS, file config.yml tải thất bại, hoặc sai GITHUB CLIENT ID / SECRET).</p>';
      
      if (document.body) {
        document.body.appendChild(errDiv);
      } else {
        document.documentElement.appendChild(errDiv);
      }
    }
  </script>
  
  <!-- Self-healing OAuth helper tab storage synchronization fallback to bypass postMessage blocking in InPrivate/Incognito/Safari tabs -->
  <script>
    (function() {
      const hadTokenAtStart = !!(localStorage.getItem('netlify-cms-user') || localStorage.getItem('decap-cms-user'));
      
      if (!hadTokenAtStart) {
        console.log("Đăng nhập chưa được thiết lập. Đang theo dõi cửa sổ phụ qua localStorage/storage events...");
        
        // Listen to native storage mutations made by callback popups
        window.addEventListener('storage', function(e) {
          if (e.key === 'netlify-cms-user' || e.key === 'decap-cms-user') {
            if (e.newValue) {
              console.log("Tìm thấy thông tin đăng nhập từ sự kiện Storage. Đang làm mới...");
              window.location.reload();
            }
          }
        });

        // Fast fallback interval polling
        const pollId = setInterval(function() {
          const hasTokenNow = !!(localStorage.getItem('netlify-cms-user') || localStorage.getItem('decap-cms-user'));
          if (hasTokenNow) {
            clearInterval(pollId);
            console.log("Đăng nhập thành công phát hiện qua Polling. Làm mới trang...");
            window.location.reload();
          }
        }, 800);
      }
    })();
  </script>
</head>
<body>
  <!-- Include the secure, stable CDN script for Decap CMS via self-healing multi-CDN fallback tag to prevent VN ISP blockages -->
  <script>
    (function() {
      const cdns = [
        "https://unpkg.com/decap-cms@3.1.2/dist/decap-cms.js",
        "https://cdn.jsdelivr.net/npm/decap-cms@3.1.2/dist/decap-cms.js"
      ];
      let currentIndex = 0;

      function tryLoadNext() {
        if (currentIndex >= cdns.length) {
          showError("Không thể nạp thư viện quản trị Decap CMS từ bất kỳ máy chủ CDN nào (UNPKG, JSDelivr). Vui lòng kiểm tra lại kết nối Internet hoặc thử dùng 3G/4G/VPN.");
          return;
        }

        const url = cdns[currentIndex];
        console.log("Đang tải Decap CMS từ: " + url + " (" + (currentIndex + 1) + "/" + cdns.length + ")...");
        
        const script = document.createElement('script');
        script.src = url;
        
        script.onload = function() {
          console.log("Nạp thành công Decap CMS chính xác từ: " + url);
        };
        
        script.onerror = function() {
          console.warn("Lỗi tải từ CDN " + url + ". Đang nạp máy chủ dự phòng tiếp theo...");
          currentIndex++;
          tryLoadNext();
        };
        
        // Append to body since we are executing in the body block
        document.body.appendChild(script);
      }

      // Execute directly as the script runs inside body, which guarantees document.body is not null!
      tryLoadNext();
    })();
  </script>
</body>
</html>
