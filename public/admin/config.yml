backend:
  name: github
  repo: em0ntageee/chamchamz-archive
  branch: main
  base_url: https://chamchamz-archive.vercel.app
  auth_endpoint: /api/auth

# Enable local backend for Vite development environment
local_backend: true

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  # Collection 0: Global Configuration Settings
  - name: "settings"
    label: "⚙️ Cấu Hình Chung Website"
    delete: false
    editor:
      preview: false
    files:
      - file: "src/data/config.json"
        label: "Cấu hình chính của Website"
        name: "website_config"
        fields:
          - label: "Tiêu đề trang chính (Navbar)"
            name: "siteTitle"
            widget: "string"
            default: "Chamchamz Archive"
            required: true
          - label: "Mô tả phụ Navbar (Sub-logo)"
            name: "siteSubtitle"
            widget: "string"
            default: "VÙNG BẢO MẬT FAN-ONLY"
            required: true
          - label: "Tiêu đề chính Hero (Headline)"
            name: "heroHeadline"
            widget: "string"
            default: "Chamchamz Archive"
            required: true
          - label: "Tiêu đề phụ Hero (Subheadline)"
            name: "heroSubheadline"
            widget: "string"
            default: "Khám Phá Rương Ký Ức Sáng Tạo & Tươi Vui 🫧"
            required: true
          - label: "Mô tả chi tiết Hero"
            name: "heroDescription"
            widget: "text"
            default: "Hộp nhạc thời gian lưu cất những manh mối nhỏ nhoi, tranh vẽ sắc sảo, gợi ý nhạc êm dịu và lá thư hâm mộ ngọt ngào của Chamchamz. Một góc trời trong lành ngọc bích chỉ dành riêng cho fan hâm mộ chân chính."
            required: true
          - label: "Chữ hiển thị Nút chính CTA"
            name: "ctaPrimaryText"
            widget: "string"
            default: "Mở Khóa Album Gợi Ý"
            required: true
          - label: "Chữ hiển thị Nút phụ CTA"
            name: "ctaSecondaryText"
            widget: "string"
            default: "Cam Kết Bảo Mật"
            required: true
          - label: "Hiện bộ đếm (Dynamic Counters)"
            name: "showCounters"
            widget: "boolean"
            default: true
          - label: "Hiện nhạc nền (Background Music)"
            name: "showMusic"
            widget: "boolean"
            default: true
          - label: "Hiện mục gợi ý (Hints)"
            name: "showHints"
            widget: "boolean"
            default: true
          - label: "Hiện triển lãm (Gallery)"
            name: "showGallery"
            widget: "boolean"
            default: true
          - label: "Hiện đề xuất (Recs)"
            name: "showRecs"
            widget: "boolean"
            default: true
          - label: "Hiện mục hòm thư gửi gắm (Contact)"
            name: "showContact"
            widget: "boolean"
            default: true
          - label: "Hiện mục mô tả/cam kết (About)"
            name: "showAbout"
            widget: "boolean"
            default: true
          - label: "Ảnh đại diện Mascot / Logo (Mascot Image)"
            name: "mascotImageUrl"
            widget: "image"
            default: ""
            required: false
          - label: "Ảnh Logo nhỏ trên Navbar (Navbar Logo Image)"
            name: "navbarLogoUrl"
            widget: "image"
            default: ""
            required: false
          - label: "Emoji Mascot gốc Navbar / Sticker"
            name: "navbarMascotEmoji"
            widget: "string"
            default: "🐹"
            required: true
          - label: "Chữ liên kết Home (Về chúng mình)"
            name: "navHomeText"
            widget: "string"
            default: "Home"
            required: true
          - label: "Hiện nút Mở Khóa Album Gợi Ý chính"
            name: "showHeroPrimaryCta"
            widget: "boolean"
            default: false
          - label: "Tên Thẻ Mục Manh Mối (Tab Title)"
            name: "hintsTabTitle"
            widget: "string"
            default: "Hints"
            required: true
          - label: "Nhãn Thẻ Mục Manh Mối (Tab Badge)"
            name: "hintsTabBadge"
            widget: "string"
            default: "Trang #01"
            required: true
          - label: "Biểu tượng Thẻ Mục Manh Mối (Tab Emoji)"
            name: "hintsTabEmoji"
            widget: "string"
            default: "🔑"
            required: true
          - label: "Mô tả ngắn thẻ Manh Mối"
            name: "hintsTabDesc"
            widget: "string"
            default: "Khám phá bí mật, sự kiện đoán trước..."
            required: true
          - label: "Hiện mô tả ngắn thẻ Manh Mối"
            name: "showHintsTabDesc"
            widget: "boolean"
            default: true
          - label: "Tên Thẻ Mục Triển Lãm (Tab Title)"
            name: "galleryTabTitle"
            widget: "string"
            default: "Gallery"
            required: true
          - label: "Nhãn Thẻ Mục Triển Lãm (Tab Badge)"
            name: "galleryTabBadge"
            widget: "string"
            default: "Trang #02"
            required: true
          - label: "Biểu tượng Thẻ Mục Triển Lãm (Tab Emoji)"
            name: "galleryTabEmoji"
            widget: "string"
            default: "📸"
            required: true
          - label: "Mô tả ngắn thẻ Triển Lãm"
            name: "galleryTabDesc"
            widget: "string"
            default: "Nụ cười tươi sáng, nét bút nguệch ngoạc..."
            required: true
          - label: "Hiện mô tả ngắn thẻ Triển Lãm"
            name: "showGalleryTabDesc"
            widget: "boolean"
            default: true
          - label: "Tên Thẻ Mục Đề Xuất (Tab Title)"
            name: "recsTabTitle"
            widget: "string"
            default: "Recs"
            required: true
          - label: "Nhãn Thẻ Mục Đề Xuất (Tab Badge)"
            name: "recsTabBadge"
            widget: "string"
            default: "Trang #03"
            required: true
          - label: "Biểu tượng Thẻ Mục Đề Xuất (Tab Emoji)"
            name: "recsTabEmoji"
            widget: "string"
            default: "🎵"
            required: true
          - label: "Mô tả ngắn thẻ Đề Xuất"
            name: "recsTabDesc"
            widget: "string"
            default: "Bài hát ru hồn, sách truyện dịu ngọt..."
            required: true
          - label: "Hiện mô tả ngắn thẻ Đề Xuất"
            name: "showRecsTabDesc"
            widget: "boolean"
            default: true
          - label: "Tên Thẻ Mục Hòm Thư (Tab Title)"
            name: "contactsTabTitle"
            widget: "string"
            default: "Contacts"
            required: true
          - label: "Nhãn Thẻ Mục Hòm Thư (Tab Badge)"
            name: "contactsTabBadge"
            widget: "string"
            default: "Trang #04"
            required: true
          - label: "Biểu tượng Thẻ Mục Hòm Thư (Tab Emoji)"
            name: "contactsTabEmoji"
            widget: "string"
            default: "✉️"
            required: true
          - label: "Mô tả ngắn thẻ Hòm Thư"
            name: "contactsTabDesc"
            widget: "string"
            default: "Viết lời chào gửi trực tiếp lên bức tường..."
            required: true
          - label: "Hiện mô tả ngắn thẻ Hòm Thư"
            name: "showContactsTabDesc"
            widget: "boolean"
            default: true
          - label: "Tiêu đề lớn phân mục Manh Mối"
            name: "hintsSectionTitle"
            widget: "string"
            default: "Cất Giữ Manh Mối Bí Mật 🔑"
            required: true
          - label: "Dòng mô tả phụ phân mục Manh Mối"
            name: "hintsSectionDesc"
            widget: "string"
            default: "Cung cấp manh mối gợi ý về Chamchamz. Tránh rò rỉ ra ngoài."
            required: true
          - label: "Hiện dòng mô tả phụ phân mục Manh Mối"
            name: "showHintsSectionDesc"
            widget: "boolean"
            default: true
          - label: "Tiêu đề lớn phân mục Triển Lãm"
            name: "gallerySectionTitle"
            widget: "string"
            default: "Tuyệt tác Triển Lãm Ảnh 📷"
            required: true
          - label: "Dòng mô tả phụ phân mục Triển Lãm"
            name: "gallerySectionDesc"
            widget: "string"
            default: "Khung hình nghệ thuật tươi trẻ, nhí nhảnh từ cuộc sống ngọt lịm của Chamchamz."
            required: true
          - label: "Hiện dòng mô tả phụ phân mục Triển Lãm"
            name: "showGallerySectionDesc"
            widget: "boolean"
            default: true
          - label: "Tiêu đề lớn phân mục Đề Xuất"
            name: "recsSectionTitle"
            widget: "string"
            default: "Không Gian Đề Xuất Nghệ Thuật 🎵"
            required: true
          - label: "Dòng mô tả phụ phân mục Đề Xuất"
            name: "recsSectionDesc"
            widget: "string"
            default: "Tổng hợp sở thích đáng yêu như sách quý, bài hát chill được yêu thích từ lòng Chamchamz."
            required: true
          - label: "Hiện dòng mô tả phụ phân mục Đề Xuất"
            name: "showRecsSectionDesc"
            widget: "boolean"
            default: true
          - label: "Tiêu đề lớn phân mục Hòm Thư"
            name: "contactsSectionTitle"
            widget: "string"
            default: "Lá Thư Gửi Gắm Tình Yêu ✉️"
            required: true
          - label: "Dòng mô tả phụ phân mục Hòm Thư"
            name: "contactsSectionDesc"
            widget: "string"
            default: "Không quản ngại khoảng cách, viết đôi lời nhắn nhủ chân thành đến Chamchamz. Đính kèm một nhãn dán dễ thương!"
            required: true
          - label: "Hiện dòng mô tả phụ phân mục Hòm Thư"
            name: "showContactsSectionDesc"
            widget: "boolean"
            default: true
          - label: "Tiêu đề mục Giới thiệu (About Title)"
            name: "aboutTitle"
            widget: "string"
            default: "Về Chamchamz Archive 🎨"
            required: true
          - label: "Tiêu đề nhỏ mục Câu Chuyện (Story Title)"
            name: "aboutStoryTitle"
            widget: "string"
            default: "🏰 Câu Chuyện Của Góc Nhỏ"
            required: true
          - label: "Đoạn văn câu chuyện #1 (Paragraph 1)"
            name: "aboutStoryPara1"
            widget: "text"
            default: "Chamchamz Archive ra đời từ ngọn lửa đam mê thuần khiết của một nhóm nhỏ những trái tim yêu thương Chamchamz vô điều kiện. Đúng như tinh thần cốt lõi trong triết lý hoạt động, chúng tôi tạo ra không gian lưu trữ số này để bảo tồn những nét dễ thương nhất, những bí mật ngọt ngào và giai điệu ru êm giấc mơ ban tối."
            required: true
          - label: "Đoạn văn câu chuyện #2 (Paragraph 2)"
            name: "aboutStoryPara2"
            widget: "text"
            default: "Website của chúng mình được mô phỏng theo triết lý mỹ thuật tối giản, rực rỡ và đong đầy niềm vui hồn nhiên. Từng chi tiết nhỏ ở đây đều được đục đẽo tỉ mỉ bằng tình cảm chân thành nhất."
            required: true
          - label: "Tiêu đề Khối Độ tin cậy (Trust Title)"
            name: "aboutTrustTitle"
            widget: "string"
            default: "ĐỘ TIN CẬY TUYỆT ĐỐI"
            required: true
          - label: "Nội dung Khối Độ tin cậy (Trust Text)"
            name: "aboutTrustText"
            widget: "text"
            default: "Mọi tư liệu ảnh, gợi ý sự kiện (hints) hay đề xuất nhạc đăng tải tại đây đều được Ban Quản Trị xác minh kỹ càng từ các nguồn chính thống, bảo vệ lòng tin tuyệt hảo của người hâm mộ."
            required: true
          - label: "Tiêu đề khối Quy Tắc (Rules Title)"
            name: "aboutRulesTitle"
            widget: "string"
            default: "Quy Tắc Tối Thượng 🔐"
            required: true
          - label: "Dòng phụ đề khối Quy Tắc (Rules Subtitle)"
            name: "aboutRulesSubtitle"
            widget: "text"
            default: "Đây là thư mục lưu giữ thông tin mang tính bảo mật và thân mật của Chamchamz. Do đó, chúng tôi thiết lập quy chuẩn hoạt động nghiêm ngặt:"
            required: true
          - label: "Quy tắc bảo mật #1 (Rule 1)"
            name: "aboutRule1"
            widget: "string"
            default: "Hoàn toàn KHÔNG trích xuất dữ liệu, chụp màn hình hay đem chia sẻ ra trang mạng xã hội công cộng khác."
            required: true
          - label: "Quy tắc bảo mật #2 (Rule 2)"
            name: "aboutRule2"
            widget: "string"
            default: "Bảo toàn không gian an yên tuyệt đối cho Chamchamz."
            required: true
          - label: "Quy tắc bảo mật #3 (Rule 3)"
            name: "aboutRule3"
            widget: "string"
            default: "Tôn trọng bản quyền tác giả trong bộ sưu tập."
            required: true
          - label: "Dòng chữ nhãn Thệ Ước (Pledge Label)"
            name: "aboutPledgeLabel"
            widget: "string"
            default: "Số fan đã thực hiện lời thề:"
            required: true
          - label: "Biểu tượng Thệ Ước (Pledge Suffix)"
            name: "aboutPledgeSuffix"
            widget: "string"
            default: "🧑‍🚀"
            required: true
          - label: "Dòng chữ nút Thệ Ước thường (Pledge Btn Text)"
            name: "aboutPledgeBtnText"
            widget: "string"
            default: "Tớ Đồng Ý Bảo Mật Kho Lưu Trữ"
            required: true
          - label: "Dòng chữ nút Thệ Ước đã ký (Signed Btn Text)"
            name: "aboutPledgeBtnSignedText"
            widget: "string"
            default: "Đã Ký Thệ Ước Bảo Mật 💖"
            required: true

  # Collection 1 & 2: Counters settings
  - name: "counters"
    label: "⏱️ Bộ Đếm Chỉ Số"
    files:
      - file: "src/data/counters.json"
        label: "Cấu hình Bộ Đếm"
        name: "counters_data"
        fields:
          - label: "Ngày bắt đầu Livestream (YYYY-MM-DD)"
            name: "stream_date"
            widget: "datetime"
            format: "YYYY-MM-DD"
            default: "2025-11-05"
            required: true
            hint: "Dùng để đo số ngày kỷ niệm đã trôi qua ."
          - label: "Số lượng lượt tham quan ban đầu (Visits Base)"
            name: "base_visits"
            widget: "number"
            default: 142580
            required: true
            hint: "Điểm mốc thiết lập trước cho lượt truy cập trang chủ."

  # Collection 3: Background Music (with audio upload field)
  - name: "music"
    label: "🎵 Nhạc Nền Thư Giãn"
    files:
      - file: "src/data/music.json"
        label: "Danh Sách Phát Nhạc"
        name: "playlist_config"
        fields:
          - label: "Phiên bản danh sách"
            name: "version"
            widget: "string"
            default: "1.0"
          - label: "Danh sách bài hát"
            name: "tracks"
            widget: "list"
            fields:
              - label: "Tên bài hát"
                name: "name"
                widget: "string"
                required: true
              - label: "Nghệ sĩ thể hiện"
                name: "artist"
                widget: "string"
                required: true
              - label: "Tập tin âm thanh (Audio File Upload)"
                name: "url"
                widget: "file"
                required: true
                hint: "Tải lên tệp .mp3, .ogg để chơi trực tiếp trên trang chủ."

  # Collection 4: Categories/Cards - Hints List
  - name: "hints"
    label: "🔍 Kho Gợi Ý & Manh Mối (Hints)"
    folder: "src/data/hints"
    extension: "json"
    format: "json"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Mã Định Danh (ID)"
        name: "id"
        widget: "string"
        required: true
      - label: "Tiêu Đề Lớn"
        name: "title"
        widget: "string"
        required: true
      - label: "Ngày Phát Hành"
        name: "date"
        widget: "string"
        required: true
      - label: "Thể loại"
        name: "category"
        widget: "select"
        options: ["gợi ý", "bí mật", "sự kiện", "thông báo"]
        required: true
      - label: "Hình Minh Họa (Emoji)"
        name: "hintIllustration"
        widget: "string"
        default: "🔑"
      - label: "Trạng Thái Mở Khóa"
        name: "isUnlocked"
        widget: "boolean"
        default: false
      - label: "Nội Dung Manh Mối / Gợi Ý"
        name: "content"
        widget: "text"
        required: true

  # Collection 5: Categories/Cards - Gallery with multiple image uploads
  - name: "gallery"
    label: "🎨 Triển Lãm Tranh & Ảnh (Gallery)"
    folder: "src/data/gallery"
    extension: "json"
    format: "json"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Mã Định Danh (ID)"
        name: "id"
        widget: "string"
        required: true
      - label: "Tiêu đề Tác phẩm"
        name: "title"
        widget: "string"
        required: true
      - label: "Ngày đăng tải"
        name: "date"
        widget: "string"
        required: true
      - label: "Mô tả ngắn"
        name: "description"
        widget: "text"
        required: true
      - label: "Emoji đại diện"
        name: "emoji"
        widget: "string"
        default: "🖼️"
      - label: "Người vẽ / Tác giả"
        name: "author"
        widget: "string"
        default: "Chamchamz Fanart"
      - label: "Màu thẻ (Tailwind Class)"
        name: "colorTheme"
        widget: "string"
        default: "from-sky-100 to-cyan-100 border-sky-300 text-sky-800"
      - label: "Từ khóa nhãn (Tags)"
        name: "tags"
        widget: "list"
        fields:
          - label: "Tên nhãn"
            name: "tag"
            widget: "string"
      - label: "Danh sách Hình ảnh tải lên (Multiple Images)"
        name: "images"
        widget: "list"
        fields:
          - label: "Tập tin Hình ảnh"
            name: "image_file"
            widget: "image"
            required: true
          - label: "Chú thích ảnh"
            name: "caption"
            widget: "string"
            required: false

  # Collection 6: Categories/Cards - Recs (Recommendations list)
  - name: "recs"
    label: "📚 Đề Xuất Sách & Nhạc (Recs)"
    folder: "src/data/recs"
    extension: "json"
    format: "json"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Mã Định Danh (ID)"
        name: "id"
        widget: "string"
        required: true
      - label: "Tiêu Đề Sách/Bài hát"
        name: "title"
        widget: "string"
        required: true
      - label: "Tác Giả / Người Sáng Tạo"
        name: "creator"
        widget: "string"
        required: true
      - label: "Thể Loại"
        name: "type"
        widget: "select"
        options: ["music", "book", "movie"]
        default: "music"
      - label: "Lý Do Nên Đọc/Nghe"
        name: "reason"
        widget: "text"
        required: true
      - label: "Tên nút nhấp (Link Text)"
        name: "linkText"
        widget: "string"
        required: false
        default: "Nghe ngay 🎧"
      - label: "Đường dẫn chi tiết"
        name: "url"
        widget: "string"
        required: false

  # Collection 7: Categories/Cards - Contact (Feedback inbox & message setup)
  - name: "contact"
    label: "✉️ Trang Gửi Thư Liên Hệ (Contact)"
    files:
      - file: "src/data/contact.json"
        name: "contact_setup"
        label: "Cấu hình Hòm Thư Liên Hệ"
        fields:
          - label: "Tiêu đề trang"
            name: "title"
            widget: "string"
            default: "Lá Thư Gửi Gắm Tình Yêu ✉️"
            required: true
          - label: "Mô tả / Lời ngỏ"
            name: "description"
            widget: "text"
            default: "Không quản ngại khoảng cách địa lý, hãy viết đôi lời nhắn nhủ ngọt ngào đến cặp đôi của chúng ta."
            required: true
          - label: "Lời chúc khi gửi thư thành công"
            name: "success_msg"
            widget: "string"
            default: "Thư đã bay thẳng vào hộp kín của Chamchamz rồi nhé! 🕊️"
            required: true
