backend:
  name: github
  repo: em0ntageee/chamchamz-archive
  branch: main
  base_url: https://chamchamz-archive.vercel.app
  auth_endpoint: /api/auth

# Enable local backend for Vite development environment
local_backend: true

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  # Collection 0: Global Configuration Settings
  - name: "settings"
    label: "⚙️ Cấu Hình Chung Website"
    delete: false
    editor:
      preview: false
    files:
      - file: "src/data/config.json"
        label: "Cấu hình chính của Website"
        name: "website_config"
        fields:
          - label: "Tiêu đề trang chính (Navbar)"
            name: "siteTitle"
            widget: "string"
            default: "Chamchamz Archive"
            required: true
          - label: "Mô tả phụ Navbar (Sub-logo)"
            name: "siteSubtitle"
            widget: "string"
            default: "VÙNG BẢO MẬT FAN-ONLY"
            required: true
          - label: "Tiêu đề chính Hero (Headline)"
            name: "heroHeadline"
            widget: "string"
            default: "Chamchamz Archive"
            required: true
          - label: "Tiêu đề phụ Hero (Subheadline)"
            name: "heroSubheadline"
            widget: "string"
            default: "Khám Phá Rương Ký Ức Sáng Tạo & Tươi Vui 🫧"
            required: true
          - label: "Mô tả chi tiết Hero"
            name: "heroDescription"
            widget: "text"
            default: "Hộp nhạc thời gian lưu cất những manh mối nhỏ nhoi, tranh vẽ sắc sảo, gợi ý nhạc êm dịu và lá thư hâm mộ ngọt ngào của Chamchamz. Một góc trời trong lành ngọc bích chỉ dành riêng cho fan hâm mộ chân chính."
            required: true
          - label: "Chữ hiển thị Nút chính CTA"
            name: "ctaPrimaryText"
            widget: "string"
            default: "Mở Khóa Album Gợi Ý"
            required: true
          - label: "Chữ hiển thị Nút phụ CTA"
            name: "ctaSecondaryText"
            widget: "string"
            default: "Cam Kết Bảo Mật"
            required: true
          - label: "Hiện bộ đếm (Dynamic Counters)"
            name: "showCounters"
            widget: "boolean"
            default: true
          - label: "Hiện nhạc nền (Background Music)"
            name: "showMusic"
            widget: "boolean"
            default: true
          - label: "Hiện mục gợi ý (Hints)"
            name: "showHints"
            widget: "boolean"
            default: true
          - label: "Hiện triển lãm (Gallery)"
            name: "showGallery"
            widget: "boolean"
            default: true
          - label: "Hiện đề xuất (Recs)"
            name: "showRecs"
            widget: "boolean"
            default: true
          - label: "Hiện mục hòm thư gửi gắm (Contact)"
            name: "showContact"
            widget: "boolean"
            default: true
          - label: "Hiện mục mô tả/cam kết (About)"
            name: "showAbout"
            widget: "boolean"
            default: true

  # Collection 1 & 2: Counters settings
  - name: "counters"
    label: "⏱️ Bộ Đếm Chỉ Số"
    files:
      - file: "src/data/counters.json"
        label: "Cấu hình Bộ Đếm"
        name: "counters_data"
        fields:
          - label: "Ngày bắt đầu Livestream (YYYY-MM-DD)"
            name: "stream_date"
            widget: "datetime"
            format: "YYYY-MM-DD"
            default: "2025-11-05"
            required: true
            hint: "Dùng để đo số ngày kỷ niệm đã trôi qua ."
          - label: "Số lượng lượt tham quan ban đầu (Visits Base)"
            name: "base_visits"
            widget: "number"
            default: 142580
            required: true
            hint: "Điểm mốc thiết lập trước cho lượt truy cập trang chủ."

  # Collection 3: Background Music (with audio upload field)
  - name: "music"
    label: "🎵 Nhạc Nền Thư Giãn"
    files:
      - file: "src/data/music.json"
        label: "Danh Sách Phát Nhạc"
        name: "playlist_config"
        fields:
          - label: "Phiên bản danh sách"
            name: "version"
            widget: "string"
            default: "1.0"
          - label: "Danh sách bài hát"
            name: "tracks"
            widget: "list"
            fields:
              - label: "Tên bài hát"
                name: "name"
                widget: "string"
                required: true
              - label: "Nghệ sĩ thể hiện"
                name: "artist"
                widget: "string"
                required: true
              - label: "Tập tin âm thanh (Audio File Upload)"
                name: "url"
                widget: "file"
                required: true
                hint: "Tải lên tệp .mp3, .ogg để chơi trực tiếp trên trang chủ."

  # Collection 4: Categories/Cards - Hints List
  - name: "hints"
    label: "🔍 Kho Gợi Ý & Manh Mối (Hints)"
    folder: "src/data/hints"
    extension: "json"
    format: "json"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Mã Định Danh (ID)"
        name: "id"
        widget: "string"
        required: true
      - label: "Tiêu Đề Lớn"
        name: "title"
        widget: "string"
        required: true
      - label: "Ngày Phát Hành"
        name: "date"
        widget: "string"
        required: true
      - label: "Thể loại"
        name: "category"
        widget: "select"
        options: ["gợi ý", "bí mật", "sự kiện", "thông báo"]
        required: true
      - label: "Hình Minh Họa (Emoji)"
        name: "hintIllustration"
        widget: "string"
        default: "🔑"
      - label: "Trạng Thái Mở Khóa"
        name: "isUnlocked"
        widget: "boolean"
        default: false
      - label: "Nội Dung Manh Mối / Gợi Ý"
        name: "content"
        widget: "text"
        required: true

  # Collection 5: Categories/Cards - Gallery with multiple image uploads
  - name: "gallery"
    label: "🎨 Triển Lãm Tranh & Ảnh (Gallery)"
    folder: "src/data/gallery"
    extension: "json"
    format: "json"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Mã Định Danh (ID)"
        name: "id"
        widget: "string"
        required: true
      - label: "Tiêu đề Tác phẩm"
        name: "title"
        widget: "string"
        required: true
      - label: "Ngày đăng tải"
        name: "date"
        widget: "string"
        required: true
      - label: "Mô tả ngắn"
        name: "description"
        widget: "text"
        required: true
      - label: "Emoji đại diện"
        name: "emoji"
        widget: "string"
        default: "🖼️"
      - label: "Người vẽ / Tác giả"
        name: "author"
        widget: "string"
        default: "Chamchamz Fanart"
      - label: "Màu thẻ (Tailwind Class)"
        name: "colorTheme"
        widget: "string"
        default: "from-sky-100 to-cyan-100 border-sky-300 text-sky-800"
      - label: "Từ khóa nhãn (Tags)"
        name: "tags"
        widget: "list"
        fields:
          - label: "Tên nhãn"
            name: "tag"
            widget: "string"
      - label: "Danh sách Hình ảnh tải lên (Multiple Images)"
        name: "images"
        widget: "list"
        fields:
          - label: "Tập tin Hình ảnh"
            name: "image_file"
            widget: "image"
            required: true
          - label: "Chú thích ảnh"
            name: "caption"
            widget: "string"
            required: false

  # Collection 6: Categories/Cards - Recs (Recommendations list)
  - name: "recs"
    label: "📚 Đề Xuất Sách & Nhạc (Recs)"
    folder: "src/data/recs"
    extension: "json"
    format: "json"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Mã Định Danh (ID)"
        name: "id"
        widget: "string"
        required: true
      - label: "Tiêu Đề Sách/Bài hát"
        name: "title"
        widget: "string"
        required: true
      - label: "Tác Giả / Người Sáng Tạo"
        name: "creator"
        widget: "string"
        required: true
      - label: "Thể Loại"
        name: "type"
        widget: "select"
        options: ["music", "book", "movie"]
        default: "music"
      - label: "Lý Do Nên Đọc/Nghe"
        name: "reason"
        widget: "text"
        required: true
      - label: "Tên nút nhấp (Link Text)"
        name: "linkText"
        widget: "string"
        required: false
        default: "Nghe ngay 🎧"
      - label: "Đường dẫn chi tiết"
        name: "url"
        widget: "string"
        required: false

  # Collection 7: Categories/Cards - Contact (Feedback inbox & message setup)
  - name: "contact"
    label: "✉️ Trang Gửi Thư Liên Hệ (Contact)"
    files:
      - file: "src/data/contact.json"
        name: "contact_setup"
        label: "Cấu hình Hòm Thư Liên Hệ"
        fields:
          - label: "Tiêu đề trang"
            name: "title"
            widget: "string"
            default: "Lá Thư Gửi Gắm Tình Yêu ✉️"
            required: true
          - label: "Mô tả / Lời ngỏ"
            name: "description"
            widget: "text"
            default: "Không quản ngại khoảng cách địa lý, hãy viết đôi lời nhắn nhủ ngọt ngào đến cặp đôi của chúng ta."
            required: true
          - label: "Lời chúc khi gửi thư thành công"
            name: "success_msg"
            widget: "string"
            default: "Thư đã bay thẳng vào hộp kín của Chamchamz rồi nhé! 🕊️"
            required: true
