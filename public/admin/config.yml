            default: true
          - label: "Tiêu Đề Cột Bản Đồ Thư Mục"
            name: "footerNavTitle"
            widget: "string"
            default: "Bản đồ Thư Mục"
            required: false
          - label: "Nhãn link Hộp Manh Mối (Hints Link Text)"
            name: "footerNavHintLabel"
            widget: "string"
            default: "📁 Hộp Manh Mối (Hints)"
            required: false
          - label: "Nhãn link Triển Lãm Ảnh (Gallery Link Text)"
            name: "footerNavGalleryLabel"
            widget: "string"
            default: "📁 Triển Lãm Ảnh (Gallery)"
            required: false
          - label: "Nhãn link Đề Xuất Nghệ Thuật (Recs Link Text)"
            name: "footerNavRecsLabel"
            widget: "string"
            default: "📁 Đề Xuất Nghệ Thuật (Recs)"
            required: false
          - label: "Nhãn link Hòm Thư Yêu Thương (Contact Link Text)"
            name: "footerNavContactLabel"
            widget: "string"
            default: "📁 Hòm Thư Yêu Thương (Contact)"
            required: false
          - label: "Hiện Cột Liên Hệ"
            name: "showFooterContactCol"
            widget: "boolean"
            default: true
          - label: "Tiêu Đề Cột Liên Hệ"
            name: "footerContactTitle"
            widget: "string"
            default: "Liên Hệ Người Giữ Khóa"
            required: false
          - label: "Địa Chỉ Email Liên Hệ"
            name: "footerContactEmail"
            widget: "string"
            default: "archive@chamchamz.fan"
            required: false
          - label: "Chú thích thêm ở cột Liên Hệ"
            name: "footerContactInfoText"
            widget: "text"
            default: "Đây là blog lưu trữ do cộng đồng fan xây dựng, phi thương mại và tuyệt đối không liên kết tài trợ chính thức nào."
            required: false
          - label: "Hiện Thanh Bản Quyền Dưới Cùng (Bottom Copyright Bar)"
            name: "showFooterBottomBar"
            widget: "boolean"
            default: true
          - label: "Dòng Chữ Bản Quyền Copyright"
