            name: "footerPolicyLabel"
            widget: "string"
            default: "Chính Sách Nội Bộ"
            required: false
          - label: "Nhãn liên kết Điều Khoản (Terms link text)"
            name: "footerTermsLabel"
            widget: "string"
            default: "Điều Khoản Fan"
            required: false

          - label: "Địa chỉ Email liên hệ mục Contacts"
            name: "contactEmail"
            widget: "string"
            default: "archive@chamchamz.fan"
            required: true
          - label: "Link Facebook mục Contacts"
            name: "contactFacebook"
            widget: "string"
            default: "https://facebook.com/chamchamz"
            required: true
          - label: "Link Threads mục Contacts"
            name: "contactThreads"
            widget: "string"
            default: "https://threads.net/@chamchamz"
            required: true

          - label: "🖼️ CẤU HÌNH SEO & CHIA SẺ TRANG (SOCIAL SHARE)"
            name: "seo_divider"
            widget: "hidden"
            default: "divider"

          - label: "Tiêu đề khi chia sẻ link (Social Share Title)"
            name: "shareTitle"
            widget: "string"
            default: "Chamchamz Archive - Vùng Bảo Mật Fan-Only 🐾"
            required: false

          - label: "Mô tả ngắn khi chia sẻ link (Social Share Description)"
            name: "shareDescription"
            widget: "text"
            default: "Nơi cất giữ báu vật rực rỡ và những hạt giống niềm vui của bé Chamchamz. Xem ngay album manh mối, triển lãm ảnh và đề xuất sách nhạc dễ thương!"
            required: false

          - label: "Ảnh bìa preview khi chia sẻ link (Social Share Image)"
            name: "shareImage"
            widget: "image"
            default: "/chamchamz_social_cover.jpg"
            required: false

  # Collection 1 & 2: Counters settings
  - name: "counters"
    label: "⏱️ Bộ Đếm Chỉ Số"
    files:
      - file: "src/data/counters.json"
        label: "Cấu hình Bộ Đếm"
        name: "counters_data"
        fields:
          - label: "Ngày bắt đầu Livestream (YYYY-MM-DD)"
            name: "stream_date"
            widget: "datetime"
            format: "YYYY-MM-DD"
            default: "2025-11-05"
            required: true
            hint: "Dùng để đo số ngày kỷ niệm đã trôi qua ."
